<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Propriedades</title>

  <!-- Fonte do Google -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400&display=swap" rel="stylesheet">

  <style>
    html {
      font-size: 30px; /* tamanho raiz */
    }

    body {
      background-color: cornflowerblue;
      color: white;
      font-size: 18px;
    }

    /* CSS correto usando classes */

    .color {
      color: coral;
    }

    .size {
      font-size: 2rem;
    }

    .weight {
      font-weight: 900;
    }

    .family {
      font-family: 'Caveat', cursive;
    }

    .align {
      text-align: right;
    }
  </style>
</head>

<body>
  <h1>Important CSS Properties</h1>

  <p class="color">Color</p>
  <p class="size">Font Size</p>
  <p class="weight">Font Weight</p>
  <p class="family">Font Family</p>
  <p class="align">Text Align</p>

</body>

</html>
